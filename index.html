<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Princesa!</title>
    <style>
        /* Configuración Básica */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Contenedor del efecto 3D */
        .card-container {
            width: 350px;
            height: 480px;
            perspective: 1000px; /* Le da la profundidad 3D */
            cursor: pointer;
        }

        /* La tarjeta que va a girar */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-radius: 20px;
        }

        /* Girar la tarjeta al pasar el mouse o hacer click */
        .card-container:hover .card, .card-container.active .card {
            transform: rotateY(180deg);
        }

        /* Caras de la tarjeta (Común) */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Oculta la otra cara al girar */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Cara Frontal */
        .card-front {
            background: white;
            color: #ff5c8a;
            border: 5px solid #ffb3c6;
        }

        .card-front h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .cake-emoji {
            font-size: 5rem;
            animation: float 2s ease-in-out infinite;
        }

        .date {
            background: #ff5c8a;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Cara Trasera (El mensaje y reproductor) */
        .card-back {
            background: linear-gradient(45deg, #ff85a1, #ff5c8a);
            color: white;
            transform: rotateY(180deg); /* Espejo inicial para el giro 3D */
            border: 5px solid #fff;
        }

        .card-back h2 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .card-back p {
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 300;
            margin-bottom: 20px;
        }

        /* Botón de Audio 3D Hermoso */
        .audio-btn {
            background: white;
            color: #ff5c8a;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            outline: none;
        }

        .audio-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .audio-btn:active {
            transform: scale(0.98);
        }

        /* Animación de latido para el corazón del botón cuando suena */
        .playing .btn-icon {
            animation: heartbeat 0.8s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.3); }
            40% { transform: scale(1); }
            60% { transform: scale(1.2); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* Animación de flotado para el pastel */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Canvas para el confeti de fondo */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .instruccion {
            position: absolute;
            bottom: 25px;
            color: #ff758f;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
            font-weight: bold;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="cumpleAudio" src="audio1.mp3" preload="auto"></audio>

    <canvas id="confetti"></canvas>

    <div class="card-container" onclick="toggleCard(this, event)">
        <div class="card">
            
            <div class="card-front">
                <div class="cake-emoji">🎂</div>
                <h1>¡Feliz Cumpleaños!</h1>
                <p>Para una niña hermosa y muy especial</p>
                <div class="date">1 de Julio</div>
            </div>
            
            <div class="card-back">
                <h2>¡Felicidades! 🎉</h2>
                <p>Hoy es un día mágico. Deseo que tu vida esté llena de risas, sorpresas, dulces y muchísima felicidad. ¡Nunca dejes de brillar, princesita!</p>
                
                <button class="audio-btn" id="musicBtn" onclick="toggleMusic(event)">
                    <span class="btn-icon">💖</span>
                    <span id="btnText">Escuchar sorpresa</span>
                </button>
            </div>

        </div>
    </div>

    <div class="instruccion">Toca la tarjeta para voltearla</div>

    <script>
        const audio = document.getElementById('cumpleAudio');
        const musicBtn = document.getElementById('musicBtn');
        const btnText = document.getElementById('btnText');

        // Función para girar la tarjeta en móviles al hacer click
        function toggleCard(container, event) {
            // Si hace click en el botón de música, no queremos que la tarjeta se voltee de inmediato
            if (event.target.closest('#musicBtn')) return;
            container.classList.toggle('active');
        }

        // Función para reproducir / pausar la música
        function toggleMusic(event) {
            event.stopPropagation(); // Evita que la tarjeta se voltee al presionar el botón
            
            if (audio.paused) {
                audio.play().then(() => {
                    musicBtn.classList.add('playing');
                    btnText.innerText = "Pausar música";
                }).catch(error => {
                    alert("Asegúrate de tener el archivo 'audio1.mp3' en la misma carpeta que este archivo.");
                    console.log("Error al reproducir audio:", error);
                });
            } else {
                audio.pause();
                musicBtn.classList.remove('playing');
                btnText.innerText = "Escuchar sorpresa";
            }
        }

        // --- CÓDIGO DEL CONFETI ---
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let pieces = [];
        const numberOfPieces = 100;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class ConfettiPiece {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 5;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.speed = Math.random() * 3 + 2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function init() {
            resizeCanvas();
            for (let i = 0; i < numberOfPieces; i++) {
                pieces.push(new ConfettiPiece());
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resizeCanvas);
        init();
    </script>
</body>
</html>
